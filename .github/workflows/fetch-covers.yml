name: Fetch book covers (one-off)

on: push

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download covers
        run: |
          mkdir -p src/img/covers
          cd src/img/covers
          curl -fsSL -o gin-sisters.jpg "https://m.media-amazon.com/images/I/81qsQQeB5-L._SY320_.jpg"
          curl -fsSL -o nocturnes.jpg "https://m.media-amazon.com/images/I/71AnBLxrWRL._SY320_.jpg"
          curl -fsSL -o when-we-were-orphans.jpg "https://m.media-amazon.com/images/I/81zHsztT1qL._SY320_.jpg"
          curl -fsSL -o klara-and-the-sun.jpg "https://m.media-amazon.com/images/I/71w6CaOT+cL._SY320_.jpg"
          curl -fsSL -o katabasis.jpg "https://m.media-amazon.com/images/I/816yNSQhjrL._SY320_.jpg"
          curl -fsSL -o poppy-war.jpg "https://m.media-amazon.com/images/I/81OJ-ky8TiL._SY320_.jpg"
          curl -fsSL -o frankie.jpg "https://m.media-amazon.com/images/I/81GAvqsqNGL._SY320_.jpg"
          curl -fsSL -o never-let-me-go.jpg "https://m.media-amazon.com/images/I/71DgZ3LElXL._SY320_.jpg"
          curl -fsSL -o babel.jpg "https://m.media-amazon.com/images/I/A1JG42T6fzL._SY320_.jpg"
          curl -fsSL -o yellowface.jpg "https://m.media-amazon.com/images/I/613uj6+BwxL._SY320_.jpg"
          curl -fsSL -o stay-true.jpg "https://m.media-amazon.com/images/I/71yxhm0p8LL._SY320_.jpg"
          curl -fsSL -o when-breath-becomes-air.jpg "https://m.media-amazon.com/images/I/61gwba1pQnL._SY320_.jpg"
          ls -la
      - name: Commit covers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/img/covers
          git diff --cached --quiet || git commit -m "Add downloaded book covers"
          git push
